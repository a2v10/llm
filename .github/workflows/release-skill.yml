name: Release skill

# Self-contained: uses no external `uses:` actions, so it is unaffected by the
# organization's "allowed actions" policy. git / gh / jq / zip are preinstalled
# on the GitHub-hosted runner.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout (manual clone, no external actions)
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      - name: Read version from plugin.json
        id: meta
        run: |
          VERSION=$(jq -r '.version' plugins/a2v10-plugin/.claude-plugin/plugin.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not read .version from plugin.json"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.meta.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package skill
        if: steps.check.outputs.exists == 'false'
        run: |
          SRC="plugins/a2v10-plugin/skills/a2v10"
          ZIP="$GITHUB_WORKSPACE/a2v10-${{ steps.meta.outputs.tag }}.zip"
          test -f "$SRC/SKILL.md" || { echo "::error::SKILL.md not found in $SRC"; exit 1; }
          # Stage only the a2v10 folder in a clean dir so nothing else can leak in
          rm -rf staging "$ZIP"
          mkdir -p staging
          cp -r "$SRC" staging/a2v10
          ( cd staging && zip -r "$ZIP" a2v10 )
          echo "=== archive contents ==="
          unzip -l "$ZIP"

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            "$GITHUB_WORKSPACE/a2v10-${{ steps.meta.outputs.tag }}.zip" \
            --target "${GITHUB_SHA}" \
            --title "a2v10 ${{ steps.meta.outputs.tag }}" \
            --notes "A2v10 skill ${{ steps.meta.outputs.tag }}. Download the zip and add it via **Claude → Customize → Skills → + → Create skill → Upload a skill**."
